name: Publish @better-fa/utils

on:
  push:
    branches: [main]
    paths:
      - "packages/utils/**"
  workflow_dispatch:

jobs:
  publish:
    name: Build + publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: current
          registry-url: https://registry.npmjs.org
          scope: "@better-fa"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build utils
        run: pnpm --filter @better-fa/utils build

      - name: Configure npm authentication
        run: |
          echo "//registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN" > ~/.npmrc
          echo "@better-fa:registry=https://registry.npmjs.org" >> ~/.npmrc

      - name: Validate npm token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is missing in GitHub Secrets."
            exit 1
          fi
          npm whoami

      - name: Check if version already exists
        id: check
        run: |
          VERSION=$(node -p "require('./packages/utils/package.json').version")
          if npm view @better-fa/utils@$VERSION version > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false'
        run: pnpm --filter @better-fa/utils publish --access public --no-git-checks

      - name: Skip duplicate version
        if: steps.check.outputs.exists == 'true'
        run: echo "Version already published. Bump version to publish again."